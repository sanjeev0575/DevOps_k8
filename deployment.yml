apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: sanjeev0181/nginx-app:latest
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: my-service-k8
spec:
  type: NodePort
  selector:
    app: devops-k8
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
