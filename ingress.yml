apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-app-ingress
  namespace: default
spec:
  # CRITICAL: Links this configuration to your cluster's public ingress controller
  ingressClassName: nginx 
  rules:
  - host: myapp.example.com  # Replace with your registered public domain name
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-service-k8  # The name of your internal Kubernetes Service
            port:
              number: 80         # The port your internal Service is listening on
